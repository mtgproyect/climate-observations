name: Actualizar observaciones

run-name: Observaciones SMN · disparo externo

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: climate-observations
  cancel-in-progress: false

jobs:
  actualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependencias
        run: python -m pip install -r requirements.txt

      - name: Consultar las 121 estaciones
        run: |
          python scripts/actualizar_observaciones.py \
            --sleep-seconds 1.5 \
            --http-attempts 4 \
            --retry-base-seconds 2.0

      - name: Ejecutar pruebas
        run: python -m unittest discover -s tests -v

      - name: Guardar actualización
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/cache/estaciones.json docs

          if git diff --cached --quiet; then
            echo "No hay cambios para guardar."
            exit 0
          fi

          git commit -m "Actualizar observaciones meteorológicas"

          for intento in 1 2 3; do
            echo "Intento de guardado ${intento}/3"

            git fetch origin main

            if ! git rebase origin/main; then
              git rebase --abort || true
              echo "Conflicto con archivos generados."
              exit 1
            fi

            if git push origin HEAD:main; then
              echo "Observaciones meteorológicas actualizadas correctamente."
              exit 0
            fi

            sleep 5
          done

          echo "No fue posible guardar los cambios después de 3 intentos."
          exit 1
